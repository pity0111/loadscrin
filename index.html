<!DOCTYPE html>
<html>
<head>
<title>SpiritRP</title>
<link rel="stylesheet" href="sleek.css">
<style>

/* Убираем фоновую картинку */
body {
  background-image: none !important;
  background-color: #000 !important;
}

@font-face {
  font-family: 'vksans';
  src: url('fonts/silkscreen_rus.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
.content {
  background-color: rgba(0, 0, 0, 0.5);
  padding: 20px;
  border-radius: 10px;
}

h1 {
  text-align: center;
}

p {
  line-height: 1.6;
}

#loadingi {
  width: 100%;
  position: absolute;
  font-size: 50px;
  font-family: 'vksans';
  text-align: center;
  top: 88%;
}

#image-container {
  position: absolute;
  width: 20vw;
  height: 20vw;
  max-width: 300px;
  max-height: 300px;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  margin: auto;
}

@keyframes glowPulse {
  0%   { filter: brightness(0.95) drop-shadow(0 0 8px rgba(140,60,230,0.5)) drop-shadow(0 0 20px rgba(120,40,200,0.3)); }
  50%  { filter: brightness(1.18) drop-shadow(0 0 26px rgba(190,90,255,0.95)) drop-shadow(0 0 55px rgba(150,55,230,0.6)) drop-shadow(0 0 80px rgba(110,30,190,0.35)); }
  100% { filter: brightness(0.95) drop-shadow(0 0 8px rgba(140,60,230,0.5)) drop-shadow(0 0 20px rgba(120,40,200,0.3)); }
}

#image-container img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: absolute;
  top: 0;
  left: 0;
  animation:
    zoomInOut 6s ease-in-out infinite,
    glowPulse 3.5s ease-in-out infinite;
}

@keyframes zoomInOut {
  0%   { transform: scale(0.85); }
  50%  { transform: scale(1); }
  100% { transform: scale(0.85); }
}

/* ═══════════════════════════════════════════════
   ПЛАШКА ИГРОКА — правый верхний угол
═══════════════════════════════════════════════ */
#player-card {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  display: none;
  flex-direction: column;
  gap: 0;
  width: 300px;

  background: linear-gradient(150deg,
    rgba(8, 3, 22, 0.88) 0%,
    rgba(25, 8, 55, 0.84) 100%
  );
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(159, 64, 221, 0.5);
  border-radius: 16px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.5),
    0 8px 32px rgba(0,0,0,0.6),
    0 0 30px rgba(100, 30, 180, 0.2),
    inset 0 1px 0 rgba(255,255,255,0.07);
  animation: cardAppear 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes cardAppear {
  from { opacity: 0; transform: translateX(40px) scale(0.94); }
  to   { opacity: 1; transform: translateX(0)    scale(1);    }
}

/* ── Верхняя секция: аватар + ник + ранг ── */
#player-card .pc-top {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px 14px 16px;
  background: rgba(255,255,255,0.03);
}

#player-card .pc-avatar {
  position: relative;
  flex-shrink: 0;
}
#player-card .pc-avatar img,
#player-card .pc-avatar-placeholder {
  width: 68px;
  height: 68px;
  border-radius: 12px;
  object-fit: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid rgba(159, 64, 221, 0.65);
  box-shadow: 0 0 16px rgba(159, 64, 221, 0.4);
}
#player-card .pc-avatar-placeholder {
  background: linear-gradient(135deg, #1e0840, #3d1270);
  font-size: 30px;
}
#player-card .pc-online-dot {
  position: absolute;
  bottom: -3px; right: -3px;
  width: 13px; height: 13px;
  background: #4cde6f;
  border-radius: 50%;
  border: 2px solid rgba(8, 3, 22, 0.95);
  box-shadow: 0 0 8px rgba(76, 222, 111, 0.8);
  animation: pulseDot 2s ease-in-out infinite;
}
@keyframes pulseDot {
  0%,100% { box-shadow: 0 0 6px rgba(76,222,111,0.7); }
  50%      { box-shadow: 0 0 14px rgba(76,222,111,1);  }
}

#player-card .pc-identity {
  display: flex;
  flex-direction: column;
  gap: 5px;
  overflow: hidden;
  flex: 1;
}
#player-card .pc-name {
  font-family: 'vksans', monospace;
  font-size: 16px;
  color: #eedeff;
  text-shadow: 0 0 12px rgba(180, 100, 255, 0.7);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#player-card .pc-rank {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'vksans', monospace;
  font-size: 11px;
  color: #c084fc;
  background: rgba(159, 64, 221, 0.18);
  border: 1px solid rgba(159, 64, 221, 0.35);
  border-radius: 6px;
  padding: 2px 8px;
  width: fit-content;
  max-width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#player-card .pc-rank::before {
  content: '★';
  font-size: 9px;
  color: #a855f7;
}

/* ── Нижняя секция: деньги + время ── */
#player-card .pc-stats {
  display: flex;
  align-items: stretch;
}
#player-card .pc-stat {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px 10px;
}
#player-card .pc-stat:first-child {
  border-right: 1px solid rgba(159, 64, 221, 0.2);
}
#player-card .pc-stat-icon {
  font-size: 20px;
  line-height: 1;
}
#player-card .pc-stat-label {
  font-family: 'vksans', monospace;
  font-size: 9px;
  color: rgba(200,160,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
#player-card .pc-stat-value {
  font-family: 'vksans', monospace;
  font-size: 15px;
  font-weight: bold;
  color: #7dffb0;
  text-shadow: 0 0 10px rgba(100, 255, 150, 0.5);
}
#player-card .pc-stat:last-child .pc-stat-value {
  color: #93c5fd;
  text-shadow: 0 0 10px rgba(100, 180, 255, 0.5);
}

/* ── Шиммер при загрузке ── */
#player-card.loading .pc-name,
#player-card.loading .pc-rank,
#player-card.loading .pc-stat-value {
  background: linear-gradient(90deg,
    rgba(255,255,255,0.05) 25%,
    rgba(255,255,255,0.14) 50%,
    rgba(255,255,255,0.05) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
  color: transparent !important;
  text-shadow: none !important;
  min-width: 60px; min-height: 12px;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Плавающие кубы (вместо снежинок) ── */
.cube-wrap {
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  perspective: 300px;
}
.pixel-cube {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}
.cube-face {
  position: absolute;
  width: 100%; height: 100%;
}
.cube-face.front  { background: rgba(120, 40, 200, 0.55); transform: translateZ(calc(var(--s)/2)); }
.cube-face.back   { background: rgba(80,  20, 150, 0.55); transform: rotateY(180deg) translateZ(calc(var(--s)/2)); }
.cube-face.left   { background: rgba(60,  10, 120, 0.55); transform: rotateY(-90deg) translateZ(calc(var(--s)/2)); }
.cube-face.right  { background: rgba(90,  30, 170, 0.55); transform: rotateY( 90deg) translateZ(calc(var(--s)/2)); }
.cube-face.top    { background: rgba(180, 80, 255, 0.55); transform: rotateX( 90deg) translateZ(calc(var(--s)/2)); }
.cube-face.bottom { background: rgba(50,  10, 100, 0.55); transform: rotateX(-90deg) translateZ(calc(var(--s)/2)); }


</style>
</head>
<body>
  <div id="loadingi">Загрузка<span id="dots"></span></div>

  <div id="image-container">
    <img src="spirit_logo_5.png" class="center">
  </div>

  <!-- ═══ ПЛАШКА ИГРОКА ═══ -->
  <div id="player-card">
    <div class="pc-top">
      <div class="pc-avatar">
        <div class="pc-avatar-placeholder" id="pc-avatar-wrap">👤</div>
        <div class="pc-online-dot"></div>
      </div>
      <div class="pc-identity">
        <div class="pc-name" id="pc-name">—</div>
        <div class="pc-rank" id="pc-rank">Игрок</div>
      </div>
    </div>
    <div class="pc-stats">
      <div class="pc-stat">
        <span class="pc-stat-icon">💰</span>
        <span class="pc-stat-label">Деньги</span>
        <span class="pc-stat-value" id="pc-wallet">0</span>
      </div>
      <div class="pc-stat">
        <span class="pc-stat-icon">⏱</span>
        <span class="pc-stat-label">Наигранно</span>
        <span class="pc-stat-value" id="pc-job">—</span>
      </div>
    </div>
  </div>

  <script>
    // ── Анимация точек ──────────────────────────────────────────────────────
    var dotsElement = document.getElementById('dots');
    var dotCount = 0;
    function animateDots() {
      var dots = '';
      for (var i = 0; i < dotCount; i++) dots += '.';
      dotsElement.textContent = dots;
      dotCount = (dotCount + 1) % 4;
    }
    setInterval(animateDots, 1000);

    // ── Форматирование денег ────────────────────────────────────────────────
    function formatMoney(n) {
      n = parseInt(n) || 0;
      if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + ' млн';
      if (n >= 1000)    return (n / 1000).toFixed(1).replace(/\.0$/, '')    + ' к';
      return String(n);
    }

    // ── Загрузка плашки игрока (с retry при неудаче) ─────────────────────────
    function loadPlayerCard(steamid, attempt) {
      if (!steamid || steamid === '') return;
      attempt = attempt || 1;

      var card = document.getElementById('player-card');
      card.style.display = 'flex';
      if (attempt === 1) card.classList.add('loading');

      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'https://loadscrin.vercel.app/api/player?steamid=' + encodeURIComponent(steamid), true);
      xhr.timeout = 12000;

      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        card.classList.remove('loading');

        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            document.getElementById('pc-name').textContent   = data.rpname   || 'Незнакомец';
            document.getElementById('pc-rank').textContent   = data.rank     || 'Юзер';
            document.getElementById('pc-job').textContent    = data.playTime || '0 минут';
            document.getElementById('pc-wallet').textContent = formatMoney(data.wallet);
            if (data.avatar) {
              var avatarWrap = document.getElementById('pc-avatar-wrap');
              avatarWrap.innerHTML = '<img src="' + data.avatar + '" alt="avatar">';
            }
          } catch(e) {
            document.getElementById('pc-name').textContent = 'Ошибка';
          }
        } else {
          // Retry до 3 раз с увеличивающейся задержкой
          if (attempt < 3) {
            setTimeout(function() { loadPlayerCard(steamid, attempt + 1); }, attempt * 2000);
          } else {
            document.getElementById('pc-name').textContent = 'Нет данных';
          }
        }
      };

      xhr.onerror = function() {
        card.classList.remove('loading');
        if (attempt < 3) {
          setTimeout(function() { loadPlayerCard(steamid, attempt + 1); }, attempt * 2000);
        }
      };

      xhr.ontimeout = function() {
        if (attempt < 3) {
          setTimeout(function() { loadPlayerCard(steamid, attempt + 1); }, 1000);
        }
      };

      xhr.send();
    }
    // ── Ждём steamid от GameDetails (опрос каждые 300мс, до 15 секунд) ──────
    var _cardLoaded = false;
    var _pollCount  = 0;
    var _pollTimer  = setInterval(function() {
      _pollCount++;
      if (_cardLoaded || _pollCount > 50) {
        clearInterval(_pollTimer);
        return;
      }
      if (typeof _pendingSteamId !== 'undefined' && _pendingSteamId) {
        _cardLoaded = true;
        clearInterval(_pollTimer);
        loadPlayerCard(_pendingSteamId);
      }
    }, 300);
  </script>

  <script src="lib/jquery-2.1.1.min.js"></script>
  <script src="lib/jquery.backstretch.min.js"></script>
  <script src="sleek.js"></script>

  <script>
// ── 3D Плавающие фигуры ────────────────────────────────────────────────────
(function() {
  var MAX = 28;
  var shapes = [];

  function rand(a, b) { return a + Math.random() * (b - a); }
  function randSign() { return Math.random() < 0.5 ? 1 : -1; }

  function buildCube(size) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'width:'+size+'px;height:'+size+'px;position:relative;transform-style:preserve-3d;';
    var half = size / 2;
    var colors = [
      'rgba(140,50,230,0.62)','rgba(90,20,160,0.62)',
      'rgba(70,15,130,0.62)','rgba(110,35,200,0.62)',
      'rgba(190,100,255,0.62)','rgba(50,10,100,0.62)'
    ];
    var tforms = [
      'translateZ('+half+'px)',
      'rotateY(180deg) translateZ('+half+'px)',
      'rotateY(-90deg) translateZ('+half+'px)',
      'rotateY(90deg)  translateZ('+half+'px)',
      'rotateX(90deg)  translateZ('+half+'px)',
      'rotateX(-90deg) translateZ('+half+'px)'
    ];
    tforms.forEach(function(t, i) {
      var f = document.createElement('div');
      f.style.cssText = 'position:absolute;width:'+size+'px;height:'+size+'px;background:'+colors[i]+';border:1px solid rgba(210,130,255,0.45);transform:'+t+';box-shadow:inset 0 0 8px rgba(200,100,255,0.3);';
      wrap.appendChild(f);
    });
    return wrap;
  }

  function buildDiamond(size) {
    var el = document.createElement('div');
    el.style.cssText = 'width:'+size+'px;height:'+size+'px;background:rgba(120,40,210,0.58);border:1px solid rgba(200,130,255,0.5);border-radius:4px;box-shadow:0 0 14px rgba(160,80,255,0.45);transform-style:preserve-3d;';
    return el;
  }

  function buildTriangle(size) {
    var el = document.createElement('div');
    el.style.cssText = 'width:0;height:0;border-left:'+(size/2)+'px solid transparent;border-right:'+(size/2)+'px solid transparent;border-bottom:'+size+'px solid rgba(130,50,220,0.68);filter:drop-shadow(0 0 7px rgba(160,80,255,0.55));';
    return el;
  }

  function spawnOne() {
    var size  = rand(14, 26);
    var type  = ['cube','diamond','triangle'][Math.floor(Math.random()*3)];

    // Обёртка — абсолютное позиционирование, не тронет поток
    var outer = document.createElement('div');
    outer.style.cssText = 'position:fixed;pointer-events:none;z-index:9997;opacity:0;will-change:transform,opacity;perspective:400px;';

    var inner = type === 'cube'     ? buildCube(size)
              : type === 'diamond'  ? buildDiamond(size)
              :                       buildTriangle(size);

    outer.appendChild(inner);
    document.body.appendChild(outer);

    var obj = {
      el:   outer,
      // Позиция в пикселях
      x:    rand(0.05, 0.92) * window.innerWidth,
      y:    rand(0.05, 0.88) * window.innerHeight,
      // Скорость дрейфа (px/frame ~60fps)
      vx:   rand(0.02, 0.08) * randSign(),
      vy:   rand(0.02, 0.08) * randSign(),
      // Углы вращения
      rx: rand(0, 360), ry: rand(0, 360), rz: rand(0, 360),
      // Скорость вращения (deg/frame) — быстрее
      vrx: rand(0.5, 1.8) * randSign(),
      vry: rand(0.5, 1.8) * randSign(),
      vrz: rand(0.3, 1.0) * randSign(),
      // Жизнь: фреймы
      life: 0,
      maxLife: Math.round(rand(300, 600)), // ~5–10 сек при 60fps
      phase: 'fadein', // fadein | live | fadeout
      size: size
    };

    shapes.push(obj);
  }

  function tick() {
    requestAnimationFrame(tick);

    // Спавним если мало
    if (shapes.length < MAX && Math.random() < 0.06) spawnOne();

    var dead = [];

    shapes.forEach(function(o, idx) {
      o.life++;

      // Фазы opacity
      var fadeFrames = 40; // ~0.67 сек
      var opacity;
      if (o.life < fadeFrames) {
        opacity = o.life / fadeFrames;
      } else if (o.life >= o.maxLife - fadeFrames) {
        opacity = (o.maxLife - o.life) / fadeFrames;
      } else {
        opacity = 1;
      }

      if (o.life >= o.maxLife) {
        dead.push(idx);
        if (o.el.parentNode) o.el.parentNode.removeChild(o.el);
        return;
      }

      // Движение
      o.x  += o.vx;
      o.y  += o.vy;
      // Лёгкое притяжение обратно к центру экрана (не улетает за край)
      o.vx += (window.innerWidth  * 0.5 - o.x) * 0.00015;
      o.vy += (window.innerHeight * 0.5 - o.y) * 0.00015;
      // Небольшое случайное блуждание
      o.vx += (Math.random() - 0.5) * 0.008;
      o.vy += (Math.random() - 0.5) * 0.008;
      // Ограничение скорости
      var maxV = 0.12;
      if (o.vx >  maxV) o.vx =  maxV;
      if (o.vx < -maxV) o.vx = -maxV;
      if (o.vy >  maxV) o.vy =  maxV;
      if (o.vy < -maxV) o.vy = -maxV;

      // Вращение
      o.rx += o.vrx;
      o.ry += o.vry;
      o.rz += o.vrz;

      o.el.style.opacity   = Math.max(0, Math.min(1, opacity)).toFixed(3);
      o.el.style.transform = 'translate('+o.x.toFixed(1)+'px,'+o.y.toFixed(1)+'px)';
      o.el.firstChild.style.transform =
        'rotateX('+o.rx.toFixed(1)+'deg) rotateY('+o.ry.toFixed(1)+'deg) rotateZ('+o.rz.toFixed(1)+'deg)';
    });

    // Удаляем мёртвые (с конца чтобы не сбить индексы)
    for (var i = dead.length - 1; i >= 0; i--) shapes.splice(dead[i], 1);
  }

  // Запускаем первые фигуры по одной с задержкой
  for (var i = 0; i < MAX; i++) {
    (function(delay){ setTimeout(spawnOne, delay); })(i * rand(150, 400));
  }

  tick();
})();


</script>
</body>
</html>
